<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Lost & Found</title>
    <!-- Tailwind CSS Integration via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col justify-center items-center font-sans antialiased selection:bg-indigo-500 selection:text-white">

    <!-- Hauptcontainer für die visuelle Zentrierung -->
    <main class="w-full max-w-4xl px-6 text-center">

        <!-- Minimalistischer, unaufdringlicher Header -->
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 sm:text-5xl">
                Lost & Found
            </h1>
            <p class="mt-3 text-gray-400 text-lg">
                Berlin Community Hub – Schnell, intelligent, direkt.
            </p>
        </header>

        <!-- Die Zwei-Button-Kommandozentrale (Psychologisch optimiert) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-2xl mx-auto">

            <!-- Button Option 1: ETWAS VERLOREN (Lost) -->
            <button onclick="selectOption('lost')"
                    class="group relative flex flex-col justify-center items-center p-10 bg-gray-900 border border-gray-800 rounded-3xl transition-all duration-300 hover:border-red-500/50 hover:bg-gradient-to-b hover:from-gray-900 hover:to-red-950/20 shadow-xl hover:shadow-red-950/20 active:scale-98">
                <!-- Visueller Indikator / "Spielautomaten-Effekt" beim Hovern -->
                <div class="absolute inset-0 rounded-3xl bg-red-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

                <!-- Platzhalter für ein großes Icon im Frontend -->
                <div class="w-16 h-16 mb-4 rounded-2xl bg-red-500/10 flex items-center justify-center text-red-400 font-bold text-2xl group-hover:scale-110 transition-transform duration-300">
                    ?
                </div>
                <span class="text-2xl font-bold tracking-wide group-hover:text-red-400 transition-colors duration-300">
                    Gegenstand verloren
                </span>
            </button>

            <!-- Button Option 2: ETWAS GEFUNDEN (Found) -->
            <button onclick="selectOption('found')"
                    class="group relative flex flex-col justify-center items-center p-10 bg-gray-900 border border-gray-800 rounded-3xl transition-all duration-300 hover:border-emerald-500/50 hover:bg-gradient-to-b hover:from-gray-900 hover:to-emerald-950/20 shadow-xl hover:shadow-emerald-950/20 active:scale-98">
                <div class="absolute inset-0 rounded-3xl bg-emerald-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

                <div class="w-16 h-16 mb-4 rounded-2xl bg-emerald-500/10 flex items-center justify-center text-emerald-400 font-bold text-2xl group-hover:scale-110 transition-transform duration-300">
                    !
                </div>
                <span class="text-2xl font-bold tracking-wide group-hover:text-emerald-400 transition-colors duration-300">
                    Gegenstand gefunden
                </span>
            </button>

        </div>

    </main>

    <!-- Einfache JavaScript-Logik zur Vorbereitung der API-Kommunikation -->
    <script>
        function selectOption(type) {
            console.log("Ausgewählter Typ:", type);
            alert("Du hast '" + (type === 'lost' ? 'Verloren' : 'Gefunden') + "' ausgewählt! Hier leiten wir den User als nächstes zum passenden Formular weiter.");
            // Hier folgt später die Weiterleitung oder das Einblenden des Formulars
        }
    </script>

</body>
</html>
